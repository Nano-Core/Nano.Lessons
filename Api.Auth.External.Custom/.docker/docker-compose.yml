services:
  api.auth.external.custom:
    image: api.auth.external.custom
    hostname: api-auth-external-custom
    restart: on-failure
    ports:
      - 8080:8080
    build:
      context: ../Api.Auth.External.Custom
      dockerfile: "Dockerfile.Local"
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge

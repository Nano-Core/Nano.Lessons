apiVersion: batch/v1
kind: CronJob
metadata:
  name: %SERVICE_NAME%
spec:
  schedule: %KUBERNETES_CRONJOB_SCHEDULE%
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: %KUBERNETES_REPLICA_HISTORY_COUNT%
  successfulJobsHistoryLimit: %KUBERNETES_REPLICA_HISTORY_COUNT%
  jobTemplate:
    metadata:
      labels:
        app: %SERVICE_NAME%
        azure.workload.identity/use: "true"
    spec:
      template:
        spec:
          serviceAccountName: %SERVICE_NAME%-service-account
          securityContext:
            runAsUser: 1000
            runAsGroup: 2000 
            fsGroup: 2000
          nodeSelector:
            nodepool.compute: %KUBERNETES_NODEPOOL_COMPUTE%
            kubernetes.io/os: linux
          containers:
          - name: %SERVICE_NAME%
            image: %CONTAINER_REGISTRY_HOST%/%IMAGE_NAME%:%VERSION%
            imagePullPolicy: Always 
            envFrom:
            - configMapRef:
                name: %SERVICE_NAME%-config
            resources:
              requests:
                memory: %KUBERNETES_MEMORY_REQUEST%
                cpu: %KUBERNETES_CPU_REQUEST%
              limits:
                memory: %KUBERNETES_MEMORY_LIMIT%
                cpu: %KUBERNETES_CPU_LIMIT%
            securityContext:
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000
              runAsGroup: 2000
              capabilities:
                drop:
                - ALL
            volumeMounts:
            - name: %SERVICE_NAME%-volume
              mountPath: /mnt/%STORAGE_SHARE_NAME%
            - name: tmp
              mountPath: /tmp
          restartPolicy: OnFailure
          volumes:
          - name: %SERVICE_NAME%-volume
            persistentVolumeClaim:
              claimName: %SERVICE_NAME%-azurefile-pvc
          - name: tmp
            emptyDir: {}



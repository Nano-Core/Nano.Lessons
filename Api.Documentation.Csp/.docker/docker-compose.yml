services:
  api.documentation.csp:
    image: api.documentation.csp
    hostname: api-documentation.csp
    restart: on-failure
    ports:
      - 8080:8080
      - 4443:4443
    build:
      context: ../Api.Documentation.Csp
      dockerfile: "Dockerfile.Local"
    volumes:
      - ../:/root/.dotnet/https
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge

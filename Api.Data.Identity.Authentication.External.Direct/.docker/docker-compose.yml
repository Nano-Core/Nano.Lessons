services:
  api.data.identity.authentication.external.direct:
    image: api.data.identity.authentication.external.direct
    hostname: api-data-authentication-external-direct
    restart: on-failure
    ports:
      - 8080:8080
    build:
      context: ../Api.Data.Identity.Authentication.External.Direct
      dockerfile: "Dockerfile.Local"
    depends_on:
      - database
    networks:
      - network

  database:
    image: mysql/mysql-server:latest
    ports:
      - 3306:3306
    networks:
      - network
    environment:
      MYSQL_USER: sa
      MYSQL_PASSWORD: myPassword_123
      MYSQL_ROOT_PASSWORD: myPassword_123
      MYSQL_DATABASE: nanoDb
      MYSQL_ROOT_HOST: '%'

networks:
  network:
    name: network
    driver: bridge

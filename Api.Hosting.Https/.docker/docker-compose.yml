services:
  api.hosting.https:
    image: api.hosting.https
    hostname: api-hosting-https
    restart: on-failure
    ports:
      - 8080:8080
      - 4443:4443
    build:
      context: ../Api.Hosting.Https
      dockerfile: "Dockerfile.Local"
    volumes:
      - ../:/root/.dotnet/https
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge

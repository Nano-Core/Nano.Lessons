services:
  api.policyheaders.cors:
    image: api.policyheaders.cors
    hostname: api-policyheaders-cors
    restart: on-failure
    ports:
      - 8080:8080
    build:
      context: ../Api.PolicyHeaders.Cors
      dockerfile: "Dockerfile.Local"
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge
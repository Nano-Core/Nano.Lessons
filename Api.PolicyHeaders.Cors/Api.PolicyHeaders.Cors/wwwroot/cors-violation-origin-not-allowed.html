<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORS Origin Violation</title>
</head>
<body>
    <h1>CORS Origin Violation</h1>

    <script>
        fetch("http://example.com/api/test")
        .then(r => r.text())
        .then(console.log)
        .catch(err => console.error("Blocked:", err));
    </script>
</body>
</html>

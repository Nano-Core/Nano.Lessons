<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORS Header Violation</title>
</head>
<body>
    <h1>CORS Header Violation</h1>

    <script>
        fetch("http://localhost:8080/api/test", {
            method: "POST",
            headers: {
                "X-Custom-Header": "test"
            }
        })
        .then(r => r.text())
        .then(console.log)
        .catch(err => console.error("Blocked:", err));
    </script>
</body>
</html>

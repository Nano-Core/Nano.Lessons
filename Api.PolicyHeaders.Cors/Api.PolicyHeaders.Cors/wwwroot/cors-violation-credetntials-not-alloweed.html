<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORS Credentials Violation</title>
</head>
<body>
    <h1>CORS Credentials Violation</h1>

    <script>
        fetch("http://localhost:5000/api/test", {
            credentials: "include"
        })
        .then(r => r.text())
        .then(console.log)
        .catch(err => console.error("Blocked:", err));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CORS Preflight Violation</title>
</head>
<body>
    <h1>CORS Preflight Violation</h1>

    <script>
        fetch("http://localhost:8080/api/test", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ test: true })
        })
        .then(r => r.text())
        .then(console.log)
        .catch(err => console.error("Blocked:", err));
    </script>
</body>
</html>

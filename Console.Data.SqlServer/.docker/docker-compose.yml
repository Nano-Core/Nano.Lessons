services:
  console.data.sqlserver:
    image: console.data.sqlserver
    restart: on-failure
    build:
      context: ../Console.Data.SqlServer
      dockerfile: "Dockerfile.Local"
    depends_on:
      - database
    networks:
      - network

  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - 1433:1433
    networks:
      - network
    environment:
      SA_PASSWORD: myPassword_123
      ACCEPT_EULA: Y
      MSSQL_PID: Developer

networks:
  network:
    name: network
    external: true

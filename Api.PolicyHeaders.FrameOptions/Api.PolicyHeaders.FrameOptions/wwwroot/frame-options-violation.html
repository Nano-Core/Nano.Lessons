<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X-Frame-Options SAMEORIGIN Violation</title>
    <style>
        body {
            font-family: sans-serif;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: 3px solid red;
        }
    </style>
</head>
<body>
    <h1>X-Frame-Options: SAMEORIGIN Test</h1>

    <p>This page attempts to embed a page protected with <strong>X-Frame-Options: SAMEORIGIN</strong> from a different origin.</p>

    <iframe src="https://google.com"></iframe>

    <p>Expected result: the iframe is blocked and remains blank. Check the browser console for a violation message.</p>
</body>
</html>

services:
  api.policyheaders.frameoptions:
    image: api.policyheaders.frameoptions
    hostname: api-policyheaders-frameoptions
    restart: on-failure
    ports:
      - 8080:8080
    build:
      context: ../Api.PolicyHeaders.FrameOptions
      dockerfile: "Dockerfile.Local"
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge
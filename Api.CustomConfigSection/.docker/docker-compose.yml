services:
  api.customconfigsection:
    image: api.customconfigsection
    hostname: api-customconfigsection
    restart: on-failure
    ports:
      - 8080:8080
    build:
      context: ../Api.CustomConfigSection
      dockerfile: "Dockerfile.Local"
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge

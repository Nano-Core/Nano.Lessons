services:
  api.authentication.external.direct:
    image: api.authentication.external.direct
    hostname: api-authentication-external-direct
    restart: on-failure
    ports:
      - 8080:8080
    build:
      context: ../Api.Authentication.External.Direct
      dockerfile: "Dockerfile.Local"
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge

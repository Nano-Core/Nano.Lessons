services:
  api.healthchecks:
    image: api.healthchecks
    hostname: api-healthchecks
    restart: on-failure
    ports:
      - 8080:8080
      - 4443:4443
    build:
      context: ../Api.HealthChecks
      dockerfile: "Dockerfile.Local"
    volumes:
      - ../:/root/.dotnet/https
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge

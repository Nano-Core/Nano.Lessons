services:
  api.virusscan:
    image: api.virusscan
    hostname: api-virusscan
    restart: on-failure
    ports:
      - 8080:8080
    depends_on:
      - clamav
    build:
      context: ../Api.VirusScan
      dockerfile: "Dockerfile.Local"
    networks:
      - network

  clamav: 
    image: clamav/clamav
    hostname: clamav
    ports:
      - 3310:3310
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge

services:
  api.data.repository.softdelete:
    image: api.data.repository.softdelete
    hostname: api-data-softdelete
    restart: on-failure
    ports:
      - 8080:8080
    build:
      context: ../Api.Data.SoftDelete
      dockerfile: "Dockerfile.Local"
    depends_on:
      - database
    networks:
      - network

  database:
    image: mysql/mysql-server:latest
    ports:
      - 3306:3306
    networks:
      - network
    environment:
      MYSQL_ROOT_HOST: '%'
      MYSQL_ROOT_PASSWORD: myPassword_123

networks:
  network:
    name: network
    driver: bridge

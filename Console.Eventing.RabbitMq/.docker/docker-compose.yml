services:
  console.eventing.rabbitmq:
    image: console.eventing.rabbitmq
    restart: on-failure
    build:
      context: ../Console.Eventing.RabbitMq
      dockerfile: "Dockerfile.Local"
    depends_on:
      - eventing
    networks:
      - network

  eventing: 
    image: rabbitmq:management
    hostname: rabbitmq
    ports:
      - 5671:5671
      - 5672:5672
      - 15671:15671
      - 15672:15672
    networks:
      - network
    environment: 
      RABBITMQ_DEFAULT_USER: rabbitmq_user
      RABBITMQ_DEFAULT_PASS: password
      RABBITMQ_DEFAULT_VHOST: /

networks:
  network:
    name: network
    external: true

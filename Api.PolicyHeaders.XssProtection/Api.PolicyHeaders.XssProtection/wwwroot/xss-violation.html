<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>XSS Protection Test</title>
</head>
<body>
    <h1>XSS Protection Test</h1>

    <p>If X-XSS-Protection is working with block mode, this page should NOT render and the no alert should show.</p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const payload = params.get("xss");

        // intentionally unsafe for testing
        if (payload) {
            document.getElementById("output").innerHTML = payload;
        }
    </script>
</body>
</html>

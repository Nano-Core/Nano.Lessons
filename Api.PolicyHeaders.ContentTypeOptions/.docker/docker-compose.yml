services:
  api.policyheaders.contenttypeoptions:
    image: api.policyheaders.contenttypeoptions
    hostname: api-policyheaders-contenttypeoptions
    restart: on-failure
    ports:
      - 8080:8080
    build:
      context: ../Api.PolicyHeaders.ContentTypeOptions
      dockerfile: "Dockerfile.Local"
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge
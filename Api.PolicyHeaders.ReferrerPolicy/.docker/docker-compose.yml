services:
  api.policyheaders.referrerpolicy:
    image: api.policyheaders.referrerpolicy
    hostname: api-policyheaders-referrerpolicy
    restart: on-failure
    ports:
      - 8080:8080
    build:
      context: ../Api.PolicyHeaders.ReferrerPolicy
      dockerfile: "Dockerfile.Local"
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge